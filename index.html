<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Logan Freeth</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    font-family: 'Space Grotesk', Arial, sans-serif;
    background: #dedad3;
    color: #111009;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ─────────────────────────────────────────
     BACKGROUND LAYERS
  ───────────────────────────────────────── */

  /* 1. Shadow animation — dark blobs displaced by turbulence */
  .shadow-wrap {
    position: fixed;
    inset: -80px;
    z-index: 0;
    filter: url(#shadow-filter) blur(8px);
  }

  .shadow-color {
    width: 100%;
    height: 100%;
    background-color: rgba(18, 14, 8, 0.62);
    mask-image: url('https://framerusercontent.com/images/ceBGguIpUU8luwByxuQz79t7To.png');
    -webkit-mask-image: url('https://framerusercontent.com/images/ceBGguIpUU8luwByxuQz79t7To.png');
    mask-size: cover;
    -webkit-mask-size: cover;
    mask-repeat: no-repeat;
    -webkit-mask-repeat: no-repeat;
    mask-position: center;
    -webkit-mask-position: center;
  }

  /* 2. Film grain — the heavy texture from the reference */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    background-image: url('https://framerusercontent.com/images/g0QcWrxr87K0ufOxIUFBakwYA8.png');
    background-size: 180px;
    background-repeat: repeat;
    opacity: 0.55;
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  /* 3. Subtle vignette — edges slightly darker */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse 90% 85% at 50% 50%, transparent 50%, rgba(12,10,6,0.18) 100%);
    pointer-events: none;
  }

  /* Hidden SVG filter */
  .filter-svg {
    position: absolute;
    width: 0;
    height: 0;
    overflow: hidden;
    pointer-events: none;
  }

  /* ─────────────────────────────────────────
     CONTENT
  ───────────────────────────────────────── */

  .page {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    min-height: 100vh;
    padding: 56px 28px max(56px, env(safe-area-inset-bottom));
    text-align: center;
  }

  /* Name — primary hero element */
  .wordmark {
    font-family: 'Outfit', Arial, sans-serif;
    font-size: clamp(36px, 9.5vw, 80px);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #111009;
    margin-bottom: 16px;
    position: relative;
    z-index: 10;
    line-height: 1.05;
  }

  /* Main headline — supporting tagline */
  h1 {
    font-family: 'Space Grotesk', Arial, sans-serif;
    font-size: clamp(18px, 4.5vw, 28px);
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1.35;
    color: rgba(17,16,9,0.72);
    margin-bottom: 0;
  }

  h1 strong {
    font-weight: 600;
    color: #111009;
  }

  /* Rule */
  .rule {
    width: 32px;
    height: 1px;
    background: rgba(17,16,9,0.2);
    margin: 20px auto 18px;
  }

  /* Sub copy */
  .sub {
    font-family: 'Space Grotesk', Arial, sans-serif;
    font-size: clamp(12px, 2.8vw, 14px);
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(17,16,9,0.62);
    line-height: 1.8;
    margin-bottom: 40px;
  }

  /* Buttons */
  .buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 300px;
    margin-bottom: 32px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: 100%;
    padding: 15px 32px;
    border-radius: 3px;
    font-family: 'Space Grotesk', Arial, sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition:
      transform 0.2s cubic-bezier(0.34,1.56,0.64,1),
      opacity 0.15s ease,
      background 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); opacity: 0.8; }

  .btn-dark {
    background: #111009;
    color: #f0ede6;
    box-shadow: 0 4px 24px rgba(0,0,0,0.22);
  }
  .btn-dark:hover { background: #231f17; transform: translateY(-1px); box-shadow: 0 8px 32px rgba(0,0,0,0.28); }

  .btn-outline {
    background: transparent;
    color: rgba(17,16,9,0.7);
    border: 1px solid rgba(17,16,9,0.22);
  }
  .btn-outline:hover { background: rgba(17,16,9,0.05); color: #111009; border-color: rgba(17,16,9,0.45); transform: translateY(-1px); }

  /* Instagram icon inline SVG */
  .ig-icon {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
  }

  /* Pills */
  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 320px;
  }

  .pill {
    font-family: 'Space Grotesk', Arial, sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(17,16,9,0.62);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pill + .pill::before {
    content: '·';
    color: rgba(17,16,9,0.4);
    font-size: 14px;
    line-height: 1;
  }

  /* Footer */
  .footer-link {
    position: fixed;
    bottom: max(24px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Space Grotesk', Arial, sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(17,16,9,0.5);
    font-weight: 500;
    text-decoration: none;
    white-space: nowrap;
    transition: color 0.15s;
  }
  .footer-link:hover { color: rgba(17,16,9,0.75); }

  /* ─────────────────────────────────────────
     DESKTOP SCALE-UP
  ───────────────────────────────────────── */
  @media (min-width: 600px) {
    .buttons {
      flex-direction: row;
      max-width: none;
      width: auto;
    }
    .btn { width: auto; padding: 15px 36px; }
  }

  @media (min-width: 1024px) {
    .wordmark { font-size: clamp(36px, 4.5vw, 64px); }
    h1 { font-size: 20px; }
    .sub { font-size: 13px; }
    .grain { opacity: 0.5; }
  }
</style>
</head>
<body>

<!-- ── SVG filter definition ── -->
<svg class="filter-svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow-filter" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence
        result="undulation"
        numOctaves="3"
        baseFrequency="0.0006,0.0025"
        seed="2"
        type="turbulence"
      />
      <feColorMatrix
        id="hueRotate"
        in="undulation"
        type="hueRotate"
        values="0"
      />
      <feColorMatrix
        in="dist"
        result="circulation"
        type="matrix"
        values="4 0 0 0 1  4 0 0 0 1  4 0 0 0 1  1 0 0 0 0"
      />
      <feDisplacementMap
        in="SourceGraphic"
        in2="circulation"
        scale="55"
        result="dist"
      />
      <feDisplacementMap
        in="dist"
        in2="undulation"
        scale="55"
        result="output"
      />
    </filter>
  </defs>
</svg>

<!-- ── Background layers ── -->
<div class="shadow-wrap">
  <div class="shadow-color"></div>
</div>
<div class="grain"></div>
<div class="vignette"></div>

<!-- ── Main content ── -->
<main class="page">

  <p class="wordmark">Logan Freeth</p>

  <h1>Turn views into <strong>bookings.</strong></h1>

  <div class="rule"></div>

  <p class="sub">
    Promo content for service businesses
  </p>

  <div class="buttons">
    <a href="https://wa.me/447000000000" class="btn btn-dark">
      Message Me
    </a>
    <a href="https://instagram.com/logan.visuals_uk" class="btn btn-outline" target="_blank" rel="noopener">
      <svg class="ig-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
      Instagram
    </a>
    <a href="index.html" class="btn btn-outline">
      View My Work
    </a>
  </div>

  <div class="pills">
    <span class="pill">Salons</span>
    <span class="pill">Barbers</span>
    <span class="pill">Local businesses</span>
  </div>

</main>

<a href="https://loganfreeth.com" class="footer-link">loganfreeth.com</a>

<script>
  // Animate hue rotation for organic shadow movement
  // Slow cycle — 20 seconds per full rotation for subtle, luxurious drift
  const hueEl = document.getElementById('hueRotate');
  const DURATION = 8000;
  let start = null;

  function tick(ts) {
    if (!start) start = ts;
    const hue = (((ts - start) % DURATION) / DURATION) * 360;
    hueEl.setAttribute('values', hue.toFixed(3));
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
</script>

</body>
</html>
